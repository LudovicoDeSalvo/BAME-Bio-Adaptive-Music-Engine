paths:
  # base data
  data_root: "data/raw/HKU956"
  processed_dir: "data/processed"
  
  # input
  ratings_csv: "data/raw/HKU956/3. AV_ratings.csv"
  personality_csv: "data/raw/HKU956/4. participant_personality.csv"
  
  # caches
  physio_cache: "data/processed/physio_cache.npz"
  profile_cache: "data/processed/profile_cache.csv"
  
  # embeddings
  physio_embeddings: "data/processed/physio_embeddings.npz"
  user_embeddings: "data/processed/user_embeddings.npz"
  song_embeddings: "data/processed/song_embeddings.npy"
  song_id_map: "data/processed/song_id_map.npy"
  
  # checkpoints (trained models)
  world_model_path: "simulator/checkpoints/world_model.pth"
  agent_checkpoint: "rl/checkpoints/sac_final_actor.pth"

model:
  action_dim: 1024              # must match MERT
  physio_embedding_dim: 64      # must match PhysioEncoder output
  profile_embedding_dim: 32     # must match DCNProfile output
  context_embedding_dim: 128    # must match ContextTransformer output

training:
  seed: 42
  batch_size: 64
  gamma: 0.99
  lr: 0.0003
  max_steps: 50
  action_clip: 1.0
  holdout_user: "hku1903"   # user that will be excluded in training and used in inference